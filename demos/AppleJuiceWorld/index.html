        <script id = "vertex-shader" type = "glsl">#version 300 es
            in vec4 a_pos;
            in vec4 a_col;
            in vec2 a_texCoord;
            
            uniform mat4 u_matrix;
            
            out vec4 v_col;
            out vec2 v_texCoord;
            void main(){
                gl_Position = u_matrix * a_pos;
                v_col = a_col;
                v_texCoord = a_texCoord;
            }
        </script>
        <script id = "fragment-shader" type = "glsl">#version 300 es
            precision highp float;
            in vec4 v_col;
            in vec2 v_texCoord;
            
            uniform sampler2D bathroom;
            uniform int u_win;
            
            out vec4 o_FragColor;
            
            void main(){
                o_FragColor = (texture(bathroom,v_texCoord*0.5));
                if(u_win == 1){
                    o_FragColor*=v_col;
                }
                if(v_col.w < 0.01){
                    o_FragColor = vec4(1,1,0,1);
                }
            }
        </script>

                        ndata[i+2]/=l;
                        ndata[i]+=x;
                        ndata[i+1]+=y;
                        ndata[i+2]+=z;
                    }
                    return ndata;
                };

            const uniforms = {};

                uniforms[i] = gl.getUniformLocation(program, i);

            gl.clearColor(0,49/255,83/255,1);
            gl.enable(gl.DEPTH_TEST);

            //<script>
            const player = {
                x:3,
                y:1,
                z:13,
                vx:0,
                vy:0,
                vz:0,
                checkPointPos:[3,1,13],
                rad:0.3,
                jumpTime:0,
                fly:false,
                won:false,
                r:{
                    pitch:0,
                    roll:0,
                    yaw:0,
                },
                toMatrix(){
                    const matrix = mat4.create();
                    mat4.rotateX(matrix,matrix,this.r.pitch);
                    mat4.rotateY(matrix,matrix,this.r.yaw);
                    mat4.translate(matrix,matrix,[-this.x,-this.y-this.rad*0.75,-this.z]);
                    return matrix;
                },
                move(){
                    
                    const c = Math.cos(this.r.yaw);
                    const s = Math.sin(this.r.yaw);
                    const cSide = Math.cos(this.r.yaw+Math.PI*0.5);
                    const sSide = Math.sin(this.r.yaw+Math.PI*0.5);
                    const speed = 0.01;
                    if(keys.w){
                        this.vx-=cSide*speed;
                        this.vz-=sSide*speed;
                    }
                    if(keys.s){
                        this.vx+=cSide*speed;
                        this.vz+=sSide*speed;
                    }
                    if(keys.a){
                        this.vx-=c*speed;
                        this.vz-=s*speed;
                    }
                    if(keys.d){
                        this.vx+=c*speed;
                        this.vz+=s*speed;
                    }
                    if(keys.r){
                        [this.x,this.y,this.z] = this.checkPointPos;
                        this.y+=1;//just a little above.
                        this.vx = this.vy = this.vz = 0;
                        if (this.checkPointPos.every((v,i)=>v==[3,1,13][i])) start = performance.now();
                        
                    }
                    if(!this.fly){
                        if(keys[" "] && this.jumpTime>0){
                            
                            this.vy = 0.2;
                            this.jumpTime = 0;
                        }
                        this.jumpTime--;
                    }else{
                        if(keys[" "]){
                            this.vy+=speed;
                        }
                        if(keys.shift){
                            this.vy-=speed;
                        }
                    }
                    
                    this.r.yaw += mouse.dx*=0.005;
                    this.r.yaw%=Math.PI*2;
                    
                    this.r.pitch += mouse.dy*0.005;
                    this.r.pitch = clamp(this.r.pitch, -Math.PI*0.5,Math.PI*0.5);
                    
                    this.x+=this.vx*=0.9;
                    this.y+=(this.vy*=0.99);
                    this.z+=this.vz*=0.9;
                    if(!this.fly){
                        this.vy-=0.005;
                    }else{
                       this.vy*=0.9; 
                    }
                },
                collideArr(arr){
                    for(var i = 0; i < arr.length; i++){
                        const block = arr[i];
                        const vx = clamp(this.x,block[0],block[0]+block[3]);
                        const vy = clamp(this.y,block[1],block[1]+block[4]);
                        const vz = clamp(this.z,block[2],block[2]+block[5]);
                        let dx = this.x-vx,
                        dy=this.y-vy,
                        dz=this.z-vz;
                        let d = dx*dx+dy*dy+dz*dz;
                        if(d<this.rad*this.rad){
                            d=Math.sqrt(d);
                            if(d){
                                dx/=d;dy/=d;dz/=d;
                                const far = this.rad-d;
                                this.x+=dx*far;
                                this.y+=dy*far;
                                this.z+=dz*far;
                                if(dy>0.8){
                                    this.jumpTime = 10;
                                }
                                
                                const velAlongNormal =
                                    -this.vx * dx+
                                    -this.vy * dy+
                                    -this.vz * dz;//dot product
                                if(velAlongNormal<0){
                                    continue;
                                }
                                const impulseLength = velAlongNormal*1.01;
                                this.vx+=dx*impulseLength;
                                this.vy+=dy*impulseLength;
                                this.vz+=dz*impulseLength;
                            }else{
                                this.y = block[1] + block[4] + this.rad*2;
                                this.vy = 0;
                            }
                        }
                    }
                },
                handleCheckPoints(arr){
                    for(var i = 0; i < arr.length; i++){
                        let checkPoint = arr[i];
                        let dx = this.x-checkPoint[0];
                        let dy = this.y-checkPoint[1];
                        let dz = this.z-checkPoint[2];
                        let d = dx*dx+dy*dy+dz*dz;
                        if(d<((checkPoint[3])+this.rad)**2){
                            if (i==arr.length-1) {gl.uniform1i(uniforms.u_win,1);this.won=true};
                            this.checkPointPos = [checkPoint[0],checkPoint[1],checkPoint[2]];
                            d=Math.sqrt(d);
                            dx/=d;dy/=d;dz/=d;
                            const far = this.rad+(checkPoint[3])-d;
                            this.x+=dx*far;
                            this.y+=dy*far;
                            this.z+=dz*far;
                            this.jumpTime = 10;
                            
                            const velAlongNormal =
                                -this.vx * dx+
                                -this.vy * dy+
                                -this.vz * dz;//dot product
                            if(velAlongNormal<0){
                                continue;
                            }
                            const impulseLength = velAlongNormal*1.01;
                            this.vx+=dx*impulseLength;
                            this.vy+=dy*impulseLength;
                            this.vz+=dz*impulseLength;
                        }
                    }
                }
            };
            cancelAnimationFrame(window.parent.raf);
            const pos = document.getElementById("pos");

            let start = performance.now();
            const render = () => {
                try{
                player.move();
                player.collideArr(blockData);
                player.handleCheckPoints(checkPointData);
                
                pos.innerText = [player.x,player.y,player.z].map(e=>e.toFixed(2)).join(",");
                if (!player.won) timer.innerText = ((performance.now()-start)/1000).toFixed(2);
                
                const matrix = mat4.create();
                mat4.perspective(matrix,Math.PI/2,canvas.width/canvas.height,0.01,100000);
                mat4.multiply(matrix,matrix,player.toMatrix());
                gl.uniformMatrix4fv(uniforms.u_matrix,false,matrix);
                
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                gl.drawArrays(gl.TRIANGLES,0,data.length/6);
                window.parent.raf = requestAnimationFrame(render);
                }catch(err){
                    log(err);
                }
                mouse.resetDelta();
            };
            render();
            log(gl.getError());
        }catch(err){
            log(err);
