<!DOCTYPE html>
<!--The other wise man-->
<html>
    <head>
        <meta charset="UTF-8" />
        <title>dec</title>
        <style>
            *{
                margin:0;
            }
            #myCanvas{
                image-rendering:pixelated;
            }
        </style>
    </head>
    <body>
        <canvas id = "myCanvas"></canvas>
        <pre id = "logger"></pre>
        <script id = "main-vertex-shader" type = "glsl">#version 300 es
            precision highp float;
            layout(location=0)in vec4 a_pos;
            layout(location=1)in vec4 a_col;
            
            uniform mat4 u_matrix;
            
            out vec4 v_col;
            void main(){
                gl_Position = u_matrix * a_pos;
                v_col = a_col;
            }
        </script>
        <script id = "main-fragment-shader" type = "glsl">#version 300 es
            precision highp float;
            
            in vec4 v_col;
            
            out vec4 o_FragColor;
            
            void main(){
                o_FragColor = v_col;
            }
        </script>
        <script id = "post-vertex-shader" type = "glsl">#version 300 es
            precision highp float;
            void main(){
                gl_Position = vec4[](
                    vec4(1,1,0,1),
                    vec4(-3,1,0,1),
                    vec4(1,-3,0,1)
                )[gl_VertexID];
            }
        </script>
        <script id = "bloom-fragment-shader">#version 300 es
            precision highp float;
            uniform sampler2D u_texture;
            
            out vec4 o_FragColor;
            
            void main(){
                vec4 col = texelFetch(u_texture,ivec2(gl_FragCoord.xy),0);
                if(col.a < 0.01){
                    o_FragColor = vec4(col.xyz,1);
                }else{
                    o_FragColor = vec4(0,0,0,0);
                }
            }
        </script>
        <script id = "blurx-fragment-shader" type = "glsl">#version 300 es
        
            precision highp float;
            uniform sampler2D u_texture;
            uniform sampler2D u_normal;//u_nique more like hahahadsgvusjdnkc
            out vec4 o_FragColor;
            const float color_ratios[] = float[](
                0.027743733063505603,
0.06655375580846169,
0.12433878524108985,
0.18091186502984205,
0.205,
0.18091186502984205,
0.12433878524108985,
0.06655375580846169,
0.027743733063505603
            );
            int blurLength = 20;
            void main(){
                vec4 o = vec4(0);
                for(int i = 0; i < blurLength+1; i++){
                    o += texelFetch(u_texture,ivec2(gl_FragCoord.xy+vec2(i-blurLength/2,0)),0)/float(blurLength);
                }
                o_FragColor = o;
            }
        </script>
        <script id = "blury-combine-fragment-shader" type = "glsl">#version 300 es
        
            precision highp float;
            uniform sampler2D u_normal;
            uniform sampler2D u_texture;
            out vec4 o_FragColor;
            const float color_ratios[] = float[](
                0.027743733063505603,
0.06655375580846169,
0.12433878524108985,
0.18091186502984205,
0.205,
0.18091186502984205,
0.12433878524108985,
0.06655375580846169,
0.027743733063505603
            );
            int blurLength = 20;
            void main(){
                vec4 o = vec4(0);
                for(int i = 0; i < blurLength+1; i++){
                    o += texelFetch(u_texture,ivec2(gl_FragCoord.xy+vec2(0,i-blurLength/2)),0)/float(blurLength);
                }
                vec4 other = texelFetch(u_normal,ivec2(gl_FragCoord.xy),0);
                o_FragColor = other + o;
            }
        </script>
        <script src = "../glmatrix.js"></script>
        <script type = "module">
        const log = (function(){
            const logger = document.getElementById("logger");
            return function(...a){
                logger.innerHTML += a + "<br>";
            };
        })();
        const clamp = (i,j,k) => i<j?j:i>k?k:i;//ijjikki
        const distsq = (a,b,c,d) => a*a-a*c+c*c+b*b-b*d+d*d;//aaabbbcccddd
        const lerp = (a,b,c) => a+(b-a)*c;
        function fract(a){
            return a-(a|0);
        }
        function sr1(a){
            return fract(Math.sin(a*49.9476)*16382.971);
        }
        function smoothstep(x){
            return x*x*(3-2*x);
        }
        function n1(s){
            var f0 = s|0;
            var f1 = f0+1;
            var d = -f0+s;
            var sf0 = sr1(f0),
                sf1 = sr1(f1);
            return lerp(sf0,sf1,smoothstep(d));
        }
        try{
            const canvas = document.getElementById("myCanvas");
            const gl = canvas.getContext("webgl2");
            
            const input = (function(){
                const keys = {};
                const mouse = {
                    dx:0,
                    dy:0,
                    reset(){
                        this.dx = this.dy = 0;
                    }
                };
                canvas.onclick = function(){
                    canvas.requestPointerLock();
                };
                canvas.onmousemove = function(e){
                    mouse.dx = e.movementX;
                    mouse.dy = e.movementY;
                };
                document.onkeydown = function(e){
                    keys[e.key.toString().toLowerCase()] = true;
                    e.preventDefault();
                };
                document.onkeyup = function(e){
                    keys[e.key.toString().toLowerCase()] = false;
                    e.preventDefault();
                };
                return {
                    mouse,
                    keys
                };
            })();
            const {mouse,keys} = input;
            
            const player = {
                pos:vec3.create(),
                vel:vec3.create(),
                r:{
                    pitch:0,
                    yaw:0,
                    roll:0,
                },
                rad:0.2,
                jumpTime:0,
                update(){
                    this.vel[0]*=0.95;
                    this.vel[1]*=0.98;
                    this.vel[2]*=0.95;
                    this.vel[1]-=0.002;
                    vec3.add(this.pos,this.pos,this.vel);
                    
                    this.r.pitch += mouse.dy*0.005;
                    this.r.pitch = clamp(this.r.pitch,-Math.PI*0.5,Math.PI*0.5);
                    
                    this.r.yaw += mouse.dx*0.005;
                    this.r.yaw %= Math.PI*2;
                    
                    var d = [0,0];
                    if(keys.w){
                        d[0] -= Math.cos(this.r.yaw+Math.PI*0.5);
                        d[1] -= Math.sin(this.r.yaw+Math.PI*0.5);
                    }
                    if(keys.s){
                        d[0] += Math.cos(this.r.yaw+Math.PI*0.5);
                        d[1] += Math.sin(this.r.yaw+Math.PI*0.5);
                    }
                    if(keys.d){
                        d[0] += Math.cos(this.r.yaw);
                        d[1] += Math.sin(this.r.yaw);
                    }
                    if(keys.a){
                        d[0] -= Math.cos(this.r.yaw);
                        d[1] -= Math.sin(this.r.yaw);
                    }
                    var dl = Math.sqrt(d[0] ** 2 + d[1] ** 2);
                    if(dl){
                        this.vel[0]+=d[0]/dl*0.002;
                        this.vel[2]+=d[1]/dl*0.002;
                    }
                    if(this.jumpTime>0 && keys[" "]){
                        this.vel[1] = Math.max(0.08,this.vel[1]+0.08);
                        this.jumpTime = 0;
                    }
                    this.jumpTime--;
                },
                toMatrix(){
                    const matrix = mat4.create();
                    mat4.rotateX(matrix,matrix,this.r.pitch);
                    mat4.rotateY(matrix,matrix,this.r.yaw);
                    mat4.translate(matrix,matrix,[-this.pos[0],-this.pos[1],-this.pos[2]]);
                    return matrix;
                },
                hitBoxArr(arr){
                    for(var i = 0; i < arr.length; i++){
                        const box = arr[i];
                        const vx = clamp(this.pos[0],box[0],box[0]+box[3]);
                        const vy = clamp(this.pos[1],box[1],box[1]+box[4]);
                        const vz = clamp(this.pos[2],box[2],box[2]+box[5]);
                        var dx = this.pos[0]-vx,
                            dy = this.pos[1]-vy,
                            dz = this.pos[2]-vz,
                            d=dx*dx+dy*dy+dz*dz;
                        if(d < this.rad*this.rad){
                            if(d){
                                const bvx = box[13] ?? 0;
                                const bvy = box[14] ?? 0;
                                const bvz = box[15] ?? 0;
                                d=Math.sqrt(d);
                                dx/=d;dy/=d;dz/=d;
                                var far = this.rad-d;
                                this.pos[0]+=dx*far;
                                this.pos[1]+=dy*far;
                                this.pos[2]+=dz*far;
                                var vAN = (bvx-this.vel[0])*dx+(bvy-this.vel[1])*dy+(bvz-this.vel[2])*dz;
                                if(vAN<0)continue;
                                this.vel[0]+=vAN*dx;
                                this.vel[1]+=vAN*dy;
                                this.vel[2]+=vAN*dz;
                                if(dy>0.5){
                                    this.jumpTime = 5;
                                }
                            }else{
                                var dirs = [
                                    [this.pos[0]-box[0]+this.rad,0,0],
                                    [this.pos[0]-box[0]-box[3]-this.rad,0,0],
                                    [0,this.pos[1]-box[1]-box[4]-this.rad,0],
                                    [0,this.pos[1]-box[1]+this.rad,0],
                                    [0,0,this.pos[2]-box[2]+this.rad],
                                    [0,0,this.pos[2]-box[2]-box[5]-this.rad]
                                ];
                                dirs.sort(function(a,b){
                                    return Math.abs(a[0]+a[1]+a[2])-Math.abs(b[0]+b[1]+b[2]);
                                });
                                this.pos[0]-=dirs[0][0];
                                this.pos[1]-=dirs[0][1];
                                this.pos[2]-=dirs[0][2];
                                var [dx,dy,dz] = dirs[0],d=Math.sqrt(dx*dx+dy*dy+dz*dz);
                                dx/=d;dy/=d;dz/=d;
                                const bvx = box[13] ?? 0;
                                const bvy = box[14] ?? 0;
                                const bvz = box[15] ?? 0;
                                var vAN = (bvx-this.vel[0])*dx+(bvy-this.vel[1])*dy+(bvz-this.vel[2])*dz;
                                this.vel[0]+=vAN*dx;
                                this.vel[1]+=vAN*dy;
                                this.vel[2]+=vAN*dz;
                                if(dy>0.5){
                                    this.jumpTime = 5;
                                }
                            }
                        }
                    }
                }
            };
            player.pos[0] = 0;
            player.pos[1] = 0;
            player.pos[2] = -10;
            
            function createProgram(vsh,fsh){
                const vertexShader = gl.createShader(gl.VERTEX_SHADER);
                gl.shaderSource(vertexShader,vsh);
                gl.compileShader(vertexShader);
                const fragmentShader = gl.createShader(gl.FRAGMENT_SHADER);
                gl.shaderSource(fragmentShader,fsh);
                gl.compileShader(fragmentShader);
                const program = gl.createProgram();
                gl.attachShader(program,vertexShader);
                gl.attachShader(program,fragmentShader);
                gl.linkProgram(program);
                if(!gl.getProgramParameter(program, gl.LINK_STATUS)){
                    log(gl.getProgramInfoLog(program));
                    if(!gl.getShaderParameter(vertexShader, gl.COMPILE_STATUS)){
                        log(gl.getShaderInfoLog(vertexShader));
                    }
                    if(!gl.getShaderParameter(fragmentShader, gl.COMPILE_STATUS)){
                        log(gl.getShaderInfoLog(fragmentShader));
                    }
                }
                return program;
            }
            
            const bluryProgram = createProgram(
                document.getElementById("post-vertex-shader").text,
                document.getElementById("blury-combine-fragment-shader").text
            );
            const bleep0 = gl.getUniformLocation(bluryProgram,"u_texture");
            const bleep1 = gl.getUniformLocation(bluryProgram,"u_normal");
            
            const blurxProgram = createProgram(
                document.getElementById("post-vertex-shader").text,
                document.getElementById("blurx-fragment-shader").text
            );
            const blurxFramebuffer = gl.createFramebuffer();
            gl.bindFramebuffer(gl.FRAMEBUFFER,blurxFramebuffer);
            let colorBlurxTexture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D,colorBlurxTexture);
            gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,canvas.width,canvas.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,colorBlurxTexture,0);
            
            const bloomProgram = createProgram(
                document.getElementById("post-vertex-shader").text,
                document.getElementById("bloom-fragment-shader").text
            );
            const bloomFramebuffer = gl.createFramebuffer();
            gl.bindFramebuffer(gl.FRAMEBUFFER,bloomFramebuffer);
            let colorBloomTexture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D,colorBloomTexture);
            gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,canvas.width,canvas.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,colorBloomTexture,0);
            
            const mainProgram = createProgram(
                document.getElementById("main-vertex-shader").text,
                document.getElementById("main-fragment-shader").text
            );
            const mainFramebuffer = gl.createFramebuffer();
            gl.bindFramebuffer(gl.FRAMEBUFFER,mainFramebuffer);
            let colorTexture = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D,colorTexture);
            gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,canvas.width,canvas.height,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,colorTexture,0);
            let depthbuffer = gl.createRenderbuffer();
            gl.bindRenderbuffer(gl.RENDERBUFFER,depthbuffer);
            gl.renderbufferStorage(gl.RENDERBUFFER, gl.DEPTH_COMPONENT24,canvas.width,canvas.height);
            gl.framebufferRenderbuffer(gl.FRAMEBUFFER,gl.DEPTH_ATTACHMENT,gl.RENDERBUFFER,depthbuffer);
            
            gl.useProgram(mainProgram);
            const mainVao = gl.createVertexArray();
            gl.bindVertexArray(mainVao);
            
            const mainVertexBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER,mainVertexBuffer);
            
            
            let mainData = [];
            const boxData = [];
            const swingBoxData = [];
            const moveBlockData = [];
            function addBlock(x,y,z,w,h,d){
                mainData.push(
                    ...rectPrism(x,y,z,w,h,d)
                );
                boxData.push([x,y,z,w,h,d]);
            }
            function addSwingBlock(x,y,z,w,h,d){
                mainData.push(
                    ...rectPrism(x,y,z,w,h,d)
                );
                swingBoxData.push([x,y,z,w,h,d]);
            }
            function addMoveBlock(x,y,z,w,h,d,x1,y1,z1,g){
                moveBlockData.push([x,y,z,w,h,d,x1,y1,z1,x,y,z,g??Math.random()*10]);
            }
            function updateMoveData(t){
                let newData = [];
                for(var i = 0; i < moveBlockData.length; i++){
                    const block = moveBlockData[i];
                    const old = [block[0],block[1],block[2]];
                    block[0] = lerp(block[9],block[6],Math.sin(t+block[12])*0.5+0.5);
                    block[1] = lerp(block[10],block[7],Math.sin(t+block[12])*0.5+0.5);
                    block[2] = lerp(block[11],block[8],Math.sin(t+block[12])*0.5+0.5);
                    block[13] = block[0]-old[0];
                    block[14] = block[1]-old[1];
                    block[15] = block[2]-old[2];
                    newData.push(...rectPrism(block[0],block[1],block[2],block[3],block[4],block[5]));//🫠
                }
                newData = new Float32Array(newData);
                const byteData = new Uint8Array(newData.buffer);
                for(var i = 12; i < byteData.length; i+=16){
                    byteData[i] = 0;
                    byteData[i+1] = 0;
                    byteData[i+2] = 0;
                    byteData[i+3] = 0;
                }
                gl.bindBuffer(gl.ARRAY_BUFFER,mainVertexBuffer);
                gl.bufferSubData(gl.ARRAY_BUFFER,startMoveData, new Float32Array(newData));
            }
            
            addBlock(-10,-20,-10,20,80,20);
            addBlock(-5, 100,-5,10,121,10);
            
            for(var i = 0;  i < 10; i++){
                addBlock(10,-10+i,-10+i*2,2,1,2);
            }
            for(var i = 0;  i < 10; i++){
                addBlock(10,10+i,8-i*2,2,1,2);
            }
            addBlock(-12,17,-12,2,2,22);
            addBlock(8,50,8,2,20,2);
            
            var snakee = [8,70,8];
            var addd = [0,0,0];
            for(var i = 0; i < 500; i++){
                addBlock(...snakee,1,1,1);
                addd[0] += n1(i*0.5)*2;
                addd[1] += n1(i*0.1+52.4)*0.5+0.2;
                addd[2] += n1(i*0.5+471.476)*2;
                var d = snakee[0]**2+snakee[2]**2;
                if(d<10*10){
                    d=Math.sqrt(d);
                    addd[0]+=d*0.1;
                    addd[2]+=d*0.1;
                }
                var leng = Math.sqrt(addd[0]**2+addd[1]**2+addd[2]**2);
                addd[0]/=leng;
                addd[1]/=leng;
                addd[2]/=leng;
                snakee[0]+=addd[0]*1;
                snakee[1]+=addd[1]*1;
                snakee[2]+=addd[2]*1;
            }
            addBlock(11,152,-7,2,2,17);
            addBlock(-6,152,-7,17,2,2);
            for(var i = 0; i < 10; i++){
                addBlock(-6,154+i,-5+i,1,1,1);
            }
            for(var i = 0; i < 12; i++){
                addBlock(-6+i,164+i,5,1,1,1);
            }
            for(var i = 0; i < 30; i++){
                addBlock(4-i,195.01+i,-6,1,2,1);
            }
            for(var i = 0; i < 4; i++){
                addBlock(-8+i,142-i,12,1,1,1);
            }
            
            boxData.push([-200,-50,-200,400,40,400]);
            for(var i = -200; i < 200; i+=4){
                for(var k = -200; k < 200; k+=4){
                    var n = [
                        Math.abs(noise.perlin2(i*0.1,k*0.1)*(distsq(i,k,0,0))*0.002),
                        Math.abs(noise.perlin2((i+4)*0.1,k*0.1)*(distsq(i+4,k,0,0))*0.002),
                        Math.abs(noise.perlin2(i*0.1,(k+4)*0.1)*(distsq(i,k+4,0,0))*0.002),
                        Math.abs(noise.perlin2((i+4)*0.1,(k+4)*0.1)*(distsq(i+4,k+4,0,0))*0.002)
                    ];
                    mainData.push(
                        i,-10+n[0],k,0,
                        i+4,-10+n[1],k,0,
                        i,-10+n[2],k+4,0,
                        i+4,-10+n[3],k+4,0,
                        i+4,-10+n[1],k,0,
                        i,-10+n[2],k+4,0,
                    );
                }
            }
            
            var swingBlockStart = mainData.length;
            addSwingBlock(-50,220,-50,100,100,100);
            for(var i = 0; i < 1000; i++){
                var g = [Math.random()*1000-500,Math.random()*1000-500,Math.random()*1000-500];
                var l = Math.sqrt(g[0]**2+g[1]**2+g[2]**2);
                g[0]/=l*0.0045;g[1]/=l*0.0045;g[2]/=l*0.0045;
                g[1] = Math.abs(g[1]);
                addSwingBlock(g[0],g[1],g[2],2,2,2);
            }
            
            const startMoveData = mainData.length;
            addMoveBlock(10,-10,10,2,10,2,10,0,10);
            
            for(var i = 0; i < 10; i++){
                addMoveBlock(10-i*2,18,-12,2,2,2,6-i*2,18,-12,i*0.2);
            }
            
            for(var i = 0; i < 10; i+=1){
                addMoveBlock(-12+i*2,15+i*5,10,2,10,2,-12+i*2,5+i*5,10);
            }
            addMoveBlock(-10,120,10,2,20,2,-10,125,10);
            for(var i = 0; i < 10; i++){
                addMoveBlock(-8+i*2,125,10,2,20,2,-7+i*2,125+i,10);
            }
            for(var i = 0; i < 10; i++){
                addMoveBlock(5,176+i*2,4-i,1,1,1,5,176+i*2+1,4-i,i*Math.PI);
            }
            
            
            mainData = new Float32Array(mainData);
            const byteData = new Uint8Array(mainData.buffer);
            for(var i = 12; i < byteData.length; i+=16){
                if(i<swingBlockStart*4){
                    byteData[i] = Math.random()*255;
                    byteData[i+1] = Math.random()*255;
                    byteData[i+2] = Math.random()*255;
                    byteData[i+3] = 255;
                }else{
                    byteData[i] = 255;
                    byteData[i+1] = 255;
                    byteData[i+2] = 255;
                    byteData[i+3] = 0;
                }
            }
            
            gl.bufferData(gl.ARRAY_BUFFER,mainData,gl.STATIC_DRAW);
            
            gl.enableVertexAttribArray(0);
            gl.vertexAttribPointer(0,3,gl.FLOAT,false,16,0);
            gl.enableVertexAttribArray(1);
            gl.vertexAttribPointer(1,4,gl.UNSIGNED_BYTE,true,16,12);            
            
            const mainUniform = {};
            for(var i of ["u_matrix"]){
                mainUniform[i] = gl.getUniformLocation(mainProgram,i);
            }
            
            gl.enable(gl.DEPTH_TEST);
            function render(){
                gl.bindFramebuffer(gl.FRAMEBUFFER,mainFramebuffer);
                gl.useProgram(mainProgram);
                const matrix = mat4.create();
                mat4.perspective(matrix,Math.PI/2,canvas.width/canvas.height,0.05, Infinity);
                mat4.multiply(matrix,matrix,player.toMatrix());
                gl.uniformMatrix4fv(mainUniform.u_matrix,false,matrix);
                gl.clearColor(0,0,0,1);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                gl.drawArrays(gl.TRIANGLES,0,mainData.length/4);
                
                gl.bindTexture(gl.TEXTURE_2D,colorTexture);
                gl.bindFramebuffer(gl.FRAMEBUFFER,bloomFramebuffer);
                gl.useProgram(bloomProgram);
                gl.drawArrays(gl.TRIANGLES,0,3);
                
                gl.bindTexture(gl.TEXTURE_2D,colorBloomTexture);
                gl.bindFramebuffer(gl.FRAMEBUFFER,blurxFramebuffer);
