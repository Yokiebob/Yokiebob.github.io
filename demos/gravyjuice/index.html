        <script id = "vertex-shader" type = "glsl">#version 300 es
            in vec4 a_pos;
            in vec4 a_col;
            in vec2 a_texCoord;
            
            uniform mat4 u_matrix;
            
            out vec4 v_col;
            out vec2 v_texCoord;
            out vec3 v_pos;
            void main(){
                gl_Position = u_matrix * a_pos;
                v_pos = gl_Position.xyz;
                v_col = a_col;
                v_texCoord = a_texCoord;
            }
        </script>
        <script id = "fragment-shader" type = "glsl">#version 300 es
            precision highp float;
            in vec4 v_col;
            in vec3 v_pos;
            in vec2 v_texCoord;
            
            uniform sampler2D bathroom;
            uniform int u_win;
            
            out vec4 o_FragColor;
            
            void main(){
                o_FragColor = vec4((texture(bathroom,v_texCoord).xyz)/(length(v_pos)*0.2),1);
                if(u_win==1){
                    o_FragColor = vec4(0,1,1,1);
                }
            }
        </script>

                                const far = this.rad-d;
                                //this.x+=dx*far;
                                //this.y+=dy*far;
                                //this.z+=dz*far;
                                vec3.scaleAndAdd(this.p,this.p,dv,far);
                                
                                const velAlongNormal =
                                    //-this.vx * dx+
                                    //-this.vy * dy+
                                    //-this.vz * dz;//dot product
                                    -vec3.dot(this.v,dv);
                                if(velAlongNormal<0){
                                    continue;
                                }
                                const impulseLength = velAlongNormal*1.01;
                                //this.vx+=dx*impulseLength;
                                //this.vy+=dy*impulseLength;
                                //this.vz+=dz*impulseLength;
                                vec3.scaleAndAdd(this.v,this.v,dv,impulseLength);
                                //if(this.touchGrass){
                                //    this.grav[0]+=dx;this.grav[1]+=dy;this.grav[2]+=dz;
                                //}else{
                                //    this.grav[0]=dx;this.grav[1]=dy;this.grav[2]=dz;
                                //}
                                vec3.add(this.nj,this.nj,dv);
                            }else{
                                this.p[1] = block[1] + block[4] + this.rad*2;
                                this.v[1] = 0;
                            }
                            this.touchGrass = true;
                        }
                    }
                },
                handleCheckPoints(arr){
                    for(var i = 0; i < arr.length; i++){
                        let checkPoint = arr[i];
                        //let dx = this.x-checkPoint[0];
                        //let dy = this.y-checkPoint[1];
                        //let dz = this.z-checkPoint[2];
                        let dv = vec3.sub(vec3.create(),this.p,vec3.fromValues(checkPoint[0],checkPoint[1],checkPoint[2]));
                        //let d = dx*dx+dy*dy+dz*dz;
                        let d = vec3.squaredLength(dv);
                        if(d<((checkPoint[3])+this.rad)**2+.001){
                            if (i==arr.length-1) {gl.uniform1i(uniforms.u_win,1);this.won=true};
                            d=Math.sqrt(d);
                            //dx/=d;dy/=d;dz/=d;
                            vec3.normalize(dv,dv);
                            const far = this.rad+(checkPoint[3])-d;
                            //this.x+=dx*far;
                            //this.y+=dy*far;
                            //this.z+=dz*far;
                            vec3.scaleAndAdd(this.p,this.p,dv,far);
                            this.jumpTime = 10;
                            
                            const velAlongNormal =
                                //-this.vx * dx+
                                //-this.vy * dy+
                                //-this.vz * dz;//dot product
                                -vec3.dot(this.v,dv);
                            if(velAlongNormal<0){
                                continue;
                            }
                            const impulseLength = velAlongNormal*1.01;
                            //this.vx+=dx*impulseLength;
                            //this.vy+=dy*impulseLength;
                            //this.vz+=dz*impulseLength;
                            vec3.scaleAndAdd(this.v,this.v,dv,impulseLength);
                            //if(this.touchGrass){
                            //    this.grav[0]+=dx;this.grav[1]+=dy;this.grav[2]+=dz;
                            //}else{
                            //    this.grav[0]=dx;this.grav[1]=dy;this.grav[2]=dz;
                            //}
                            vec3.add(this.nj,this.nj,dv);
                            this.touchGrass = true;
                        }
                    }
                },
                rotateIJK(){
                    if (vec3.squaredLength(this.nj) == 0 || vec3.equals(this.j,vec3.normalize(this.nj,this.nj))) return;
                    const about = vec3.cross(vec3.create(),this.j,this.nj);
                    let ang = vec3.angle(this.j,this.nj);
                    if (vec3.dot(this.nj,this.j) < -.99 && this.touchGrass) ang=Math.PI,vec3.set(about,...this.k);
                    const mat = mat4.create();
                    mat4.rotate(mat,mat,ang,about);
                    vec3.transformMat4(this.i,this.i,mat);
                    vec3.transformMat4(this.j,this.j,mat);
                    vec3.transformMat4(this.k,this.k,mat);
                },
                rotateV(){
                    let ang = vec3.angle(this.j,this.vj);
                    const v = vec3.clone(this.vj);
                    this.vi = vec3.clone(this.i);
                    this.vj = vec3.clone(this.j);
                    this.vk = vec3.clone(this.k);
                    if (Math.abs(ang) < .001) return;
                    const about = vec3.cross(vec3.create(),this.j,v);
                    if (vec3.dot(v,this.j) < -.999) ang=Math.PI,vec3.set(about,...this.k);
                    const mat = mat4.create();
                    mat4.rotate(mat,mat,Math.abs(ang) < .1 ? 0 : ang-Math.sign(ang)*.1,about);
                    vec3.transformMat4(this.vi,this.vi,mat);
                    vec3.transformMat4(this.vj,this.vj,mat);
                    vec3.transformMat4(this.vk,this.vk,mat);
                }
            };
            cancelAnimationFrame(window.parent.raf);
            const pos = document.getElementById("pos");
            const timer = document.getElementById("timer");
            let start = performance.now();
            const render = () => {
                try{
                player.move();
                player.collideArr(blockData);
                player.handleCheckPoints(checkPointData);
                player.rotateIJK();
                player.rotateV();
                pos.innerText = player.p.map(e=>e.toFixed(2)).join(",");
                if (!player.won) timer.innerText = ((performance.now()-start)/1000).toFixed(2);
                
                const matrix = mat4.create();
                mat4.perspective(matrix,Math.PI/2,canvas.width/canvas.height,0.01,100000);
                mat4.multiply(matrix,matrix,player.toMatrix());
                gl.uniformMatrix4fv(uniforms.u_matrix,false,matrix);
                
                //gl.enable(gl.DEPTH_TEST);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                gl.uniform1i(uniforms.u_win,0);
                gl.drawArrays(gl.TRIANGLES,0,data.length/6);
                //gl.disable(gl.DEPTH_TEST);
                gl.uniform1i(uniforms.u_win,1);
                gl.drawArrays(gl.LINES,0,data.length/6);
                mouse.resetDelta();
                window.parent.raf = requestAnimationFrame(render);
                }catch(err){
                    log(err);
                }
            };
            render();
            log(gl.getError());
            window.onresize = function(){
                canvas.width = window.innerWidth/4;
                canvas.height = window.innerHeight/4;
                gl.viewport(0,0,canvas.width,canvas.height);
                canvas.style.width = window.innerWidth+"px";
                canvas.style.height = window.innerHeight+"px";
            };
            window.onresize();
        }catch(err){
            log(err);
        }
        </script>
    </body>
</html>
